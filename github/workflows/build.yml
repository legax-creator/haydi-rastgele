name: Build Minecraft Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repo'yu Kopyala (Checkout)
      uses: actions/checkout@v4

    - name: Java (JDK 17) Kurulumu
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Gradle Yetkisi Ver
      run: chmod +x gradlew

    - name: Modu Derle (Build)
      run: ./gradlew build

    - name: Oluşan Jar Dosyasını Kaydet (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Haydirastgele-Mod-Jar
        path: build/libs/*.jar
        
