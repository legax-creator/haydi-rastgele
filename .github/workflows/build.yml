name: Build Minecraft Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repo'yu Kopyala (Checkout)
      uses: actions/checkout@v4

    - name: Java (JDK 17) Kurulumu
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Burada Gradle sürümünü Forge'un desteklediği 8.5 sürümüne sabitliyoruz
    - name: Uyumlu Gradle Sürümünü Kur (Gradle 8.5)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Modu Derle
      run: gradle build

    - name: Oluşan Jar Dosyasını Kaydet (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Haydirastgele-Mod-Jar
        path: build/libs/*.jar
        
